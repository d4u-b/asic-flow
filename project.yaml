project:
  name: demo_asic

runtime:
  workspace_root: work
  logs_root: logs
  plugin_paths:
    - project_flows
  env:
    TOP: demo_top
    RTL_DIR: ./example/rtl
    TB_DIR: ./example/tb
    REPORT_DIR: ./reports

defaults:
  plugin: asic_flow.flows.builtin:CommandFlow
  workdir: .

include:
  - flows/core.yaml
  - flows/ram.yaml
